<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador 3D de Ecuaciones</title>
    <link rel="stylesheet" href="sebasdv-design-system.css">
    <style>
        /* Custom layout for 3D Generator */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* Header */
        #header {
            background: var(--gb-dark);
            color: var(--gb-text-inverse);
            padding: var(--spacing-sm) var(--spacing-md);
            border-bottom: 2px solid var(--gb-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 100;
        }

        #header h1 {
            font-size: var(--font-size-lg);
            margin: 0;
            color: var(--gb-primary);
        }

        /* Main content area */
        #main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* 3D Canvas Container - Main view */
        #canvas-container {
            flex: 1;
            position: relative;
            background: var(--gb-background);
            overflow: hidden;
        }

        /* Controls sidebar */
        #controls-sidebar {
            width: 350px;
            background: var(--gb-surface);
            border-left: 1px solid var(--gb-border);
            overflow-y: auto;
            flex-shrink: 0;
        }

        /* Flush accordion styling */
        .accordion-flush {
            border: none;
            border-radius: 0;
        }

        .accordion-flush .accordion-item {
            border-radius: 0;
            border-left: none;
            border-right: none;
            border-top: none;
        }

        .accordion-flush .accordion-item:first-child {
            border-top: 1px solid var(--gb-border);
        }

        /* Custom accordion styles */
        .param-slider-inline {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-sm);
        }

        .param-slider-inline label {
            flex: 0 0 120px;
            font-size: var(--font-size-sm);
            margin: 0;
        }

        .param-slider-inline input[type="range"] {
            flex: 1;
        }

        .param-slider-inline .param-value {
            flex: 0 0 60px;
            text-align: right;
            font-size: var(--font-size-sm);
            font-weight: 600;
            color: var(--gb-primary);
        }

        /* Mobile toggle button */
        #mobile-controls-toggle {
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 200;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--gb-primary);
            color: var(--gb-text-inverse);
            border: none;
            box-shadow: var(--shadow-lg);
            font-size: 24px;
            cursor: pointer;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            #controls-sidebar {
                position: fixed;
                top: 0;
                right: -350px;
                height: 100vh;
                z-index: 150;
                transition: right 0.3s ease;
                box-shadow: var(--shadow-lg);
            }

            #controls-sidebar.active {
                right: 0;
            }

            #mobile-controls-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        /* Equation input group */
        .equation-group {
            padding: var(--spacing-md);
        }

        .equation-input-full {
            width: 100%;
            margin-bottom: var(--spacing-sm);
        }

        .button-group {
            display: flex;
            gap: var(--spacing-xs);
            flex-wrap: wrap;
        }

        .button-group button {
            flex: 1;
            min-width: 120px;
        }

        /* Examples grid */
        .examples-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--spacing-xs);
        }

        .example-btn {
            width: 100%;
            text-align: left;
            font-size: var(--font-size-sm);
        }
    </style>
</head>
<body>
    <div id="app-container">
        <!-- Header -->
        <div id="header">
            <h1>3D Equation Generator</h1>
            <button class="btn-primary" onclick="openHelp()">Help</button>
        </div>

        <!-- Main content -->
        <div id="main-content">
            <!-- 3D Canvas - Main view -->
            <div id="canvas-container"></div>

            <!-- Controls sidebar -->
            <div id="controls-sidebar">
                <!-- Equation input -->
                <div class="equation-group">
                    <label>Equation z = f(x, y):</label>
                    <input type="text" id="equation" class="equation-input-full"
                           value="a1*x^3 + a2*y^3 + a3*x^2 + a4*y^2 + a5*x^2*y^2"
                           placeholder="e.g., A * sin(f*x + phi)">
                    <div id="equation-status"></div>
                    <div class="button-group">
                        <button class="btn-primary" onclick="generateSurface()">Generate</button>
                        <button class="btn" onclick="resetView()">Reset View</button>
                    </div>
                </div>

                <!-- Flush Accordion -->
                <div class="accordion accordion-flush">
                    <!-- Examples -->
                    <div class="accordion-item">
                        <button class="accordion-header" onclick="toggleAccordion('examples')">
                            Popular Examples
                        </button>
                        <div class="accordion-content" id="examples-accordion">
                            <div class="accordion-body">
                                <div class="examples-grid">
                                    <button class="btn example-btn" onclick="loadExample('A * sin(f*sqrt(x^2 + y^2) + phi)')">Radial Waves</button>
                                    <button class="btn example-btn" onclick="loadExample('A * sin(f*x + phi) * cos(f*y)')">Modulated Waves</button>
                                    <button class="btn example-btn" onclick="loadExample('A * exp(-(x^2 + y^2) / f)')">Gaussian Bell</button>
                                    <button class="btn example-btn" onclick="loadExample('(y^2 - x^2) / 4')">Hyperbolic Paraboloid</button>
                                    <button class="btn example-btn" onclick="loadExample('A * cos(f*x + phi) * sin(f*y)')">Crossed Waves</button>
                                    <button class="btn example-btn" onclick="loadExample('A * sin(f*x*y + phi)')">XY Interference</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Wave Parameters -->
                    <div class="accordion-item">
                        <button class="accordion-header active" onclick="toggleAccordion('wave-params')">
                            Wave Parameters
                        </button>
                        <div class="accordion-content active" id="wave-params-accordion">
                            <div class="accordion-body">
                                <div class="param-slider-inline">
                                    <label>Amplitude (A):</label>
                                    <input type="range" id="A" class="slider" min="0.1" max="5" step="0.1" value="2">
                                    <span class="param-value" id="A-value">2.0</span>
                                </div>
                                <div class="param-slider-inline">
                                    <label>Frequency (f):</label>
                                    <input type="range" id="f" class="slider" min="0.1" max="10" step="0.1" value="2">
                                    <span class="param-value" id="f-value">2.0</span>
                                </div>
                                <div class="param-slider-inline">
                                    <label>Phase (φ):</label>
                                    <input type="range" id="phi" class="slider" min="0" max="6.28" step="0.1" value="0">
                                    <span class="param-value" id="phi-value">0.0</span>
                                </div>
                                <div class="toggle">
                                    <input type="checkbox" id="auto-update" class="toggle-input" checked>
                                    <label for="auto-update" class="toggle-label">
                                        <span class="toggle-switch"></span>
                                        Auto-update
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Function f(x,y) Parameters -->
                    <div class="accordion-item">
                        <button class="accordion-header active" onclick="toggleAccordion('function-params')">
                            Function f(x,y) Parameters
                        </button>
                        <div class="accordion-content active" id="function-params-accordion">
                            <div class="accordion-body">
                                <div class="param-slider-inline">
                                    <label>x³ (a1):</label>
                                    <input type="range" id="a1" class="slider" min="-1" max="1" step="0.01" value="-0.25">
                                    <span class="param-value" id="a1-value">-0.25</span>
                                </div>
                                <div class="param-slider-inline">
                                    <label>y³ (a2):</label>
                                    <input type="range" id="a2" class="slider" min="-1" max="1" step="0.01" value="-0.25">
                                    <span class="param-value" id="a2-value">-0.25</span>
                                </div>
                                <div class="param-slider-inline">
                                    <label>x² (a3):</label>
                                    <input type="range" id="a3" class="slider" min="-1" max="1" step="0.01" value="0.5">
                                    <span class="param-value" id="a3-value">0.50</span>
                                </div>
                                <div class="param-slider-inline">
                                    <label>y² (a4):</label>
                                    <input type="range" id="a4" class="slider" min="-1" max="1" step="0.01" value="0.5">
                                    <span class="param-value" id="a4-value">0.50</span>
                                </div>
                                <div class="param-slider-inline">
                                    <label>x²y² (a5):</label>
                                    <input type="range" id="a5" class="slider" min="-1" max="1" step="0.01" value="-0.25">
                                    <span class="param-value" id="a5-value">-0.25</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Visualization Controls -->
                    <div class="accordion-item">
                        <button class="accordion-header" onclick="toggleAccordion('viz-controls')">
                            Visualization Controls
                        </button>
                        <div class="accordion-content" id="viz-controls-accordion">
                            <div class="accordion-body">
                                <div class="param-slider-inline">
                                    <label>Resolution:</label>
                                    <input type="range" id="resolution" class="slider" min="20" max="100" value="50">
                                    <span class="param-value" id="resolution-value">50</span>
                                </div>
                                <div class="param-slider-inline">
                                    <label>Range:</label>
                                    <input type="range" id="range" class="slider" min="1" max="10" value="4">
                                    <span class="param-value" id="range-value">4</span>
                                </div>
                                <div class="param-slider-inline">
                                    <label>Thickness:</label>
                                    <input type="range" id="thickness" class="slider" min="0.1" max="2" step="0.1" value="0.3">
                                    <span class="param-value" id="thickness-value">0.3</span>
                                </div>
                                <div class="param-slider-inline">
                                    <label>Z Scale:</label>
                                    <input type="range" id="zScale" class="slider" min="0.1" max="3" step="0.1" value="1">
                                    <span class="param-value" id="zScale-value">1.0</span>
                                </div>
                                <div class="param-slider-inline">
                                    <label>Opacity:</label>
                                    <input type="range" id="opacity" class="slider" min="0.1" max="1" step="0.1" value="0.8">
                                    <span class="param-value" id="opacity-value">0.8</span>
                                </div>
                                <div class="button-group" style="margin-top: var(--spacing-md);">
                                    <button class="btn" id="exportSTL">Export STL</button>
                                    <button class="btn" onclick="toggleWireframe()">Wireframe</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile toggle button -->
    <button id="mobile-controls-toggle" onclick="toggleMobileControls()">⚙</button>

    <!-- Help Modal (simplified) -->
    <div class="modal-overlay" id="helpModal">
        <div class="modal">
            <h2 class="modal-title">3D Equation Generator - Help</h2>
            <div class="modal-content">
                <h3>Available Functions</h3>
                <p><strong>Trig:</strong> sin, cos, tan</p>
                <p><strong>Other:</strong> log, exp, sqrt, abs</p>
                <p><strong>Constants:</strong> PI, E</p>
                <p><strong>Operators:</strong> +, -, *, /, ^ (power)</p>
                <h3>Variables</h3>
                <p>x, y, A, f, phi, a1-a5</p>
            </div>
            <button class="btn-primary" onclick="closeHelp()">Close</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
    <script>
        let scene, camera, renderer, surface, wireframe;
        let currentEquation = "a1*x^3 + a2*y^3 + a3*x^2 + a4*y^2 + a5*x^2*y^2";
        let showWireframe = true;
        let parameters = {
            A: 2.0, f: 2.0, phi: 0.0,
            a1: -0.25, a2: -0.25, a3: 0.5, a4: 0.5, a5: -0.25
        };
        let controls = {
            isMouseDown: false,
            mouseX: 0, mouseY: 0,
            rotationX: 0.3, rotationY: 0.5
        };

        // Initialize Three.js scene
        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xd9d2c6);

            camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(8, 8, 8);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            addLights();
            addAxes();
            addEventListeners();
            animate();

            setTimeout(() => {
                updateAllParameterValues();
                generateSurface();
            }, 100);
        }

        function addLights() {
            const ambientLight = new THREE.AmbientLight(0x404040, 0.4);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 10, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0xed8008, 0.5, 50);
            pointLight.position.set(-5, 5, 5);
            scene.add(pointLight);
        }

        function addAxes() {
            const xAxis = new THREE.Mesh(
                new THREE.CylinderGeometry(0.02, 0.02, 10),
                new THREE.MeshBasicMaterial({ color: 0xff0000 })
            );
            xAxis.rotation.z = Math.PI / 2;
            scene.add(xAxis);

            const yAxis = new THREE.Mesh(
                new THREE.CylinderGeometry(0.02, 0.02, 10),
                new THREE.MeshBasicMaterial({ color: 0x00ff00 })
            );
            scene.add(yAxis);

            const zAxis = new THREE.Mesh(
                new THREE.CylinderGeometry(0.02, 0.02, 10),
                new THREE.MeshBasicMaterial({ color: 0x0000ff })
            );
            zAxis.rotation.x = Math.PI / 2;
            scene.add(zAxis);
        }

        function addEventListeners() {
            const canvas = renderer.domElement;
            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('wheel', onWheel);

            window.addEventListener('resize', onWindowResize);

            // Parameter sliders
            ['A', 'f', 'phi', 'a1', 'a2', 'a3', 'a4', 'a5', 'resolution', 'range', 'thickness', 'zScale', 'opacity'].forEach(param => {
                const slider = document.getElementById(param);
                if (slider) {
                    slider.addEventListener('input', (e) => {
                        const value = parseFloat(e.target.value);
                        const valueDisplay = document.getElementById(`${param}-value`);
                        if (valueDisplay) {
                            const decimals = param.startsWith('a') ? 2 : param === 'phi' ? 2 : 1;
                            valueDisplay.textContent = value.toFixed(decimals);
                        }
                        if (['A', 'f', 'phi', 'a1', 'a2', 'a3', 'a4', 'a5'].includes(param)) {
                            parameters[param] = value;
                            if (document.getElementById('auto-update').checked) {
                                generateSurface();
                            }
                        } else {
                            generateSurface();
                        }
                    });
                }
            });

            document.getElementById('equation').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') generateSurface();
            });

            document.getElementById('exportSTL').addEventListener('click', exportSTL);
        }

        function updateAllParameterValues() {
            ['A', 'f', 'phi', 'a1', 'a2', 'a3', 'a4', 'a5'].forEach(param => {
                const slider = document.getElementById(param);
                const valueDisplay = document.getElementById(`${param}-value`);
                if (slider && valueDisplay) {
                    const value = parseFloat(slider.value);
                    const decimals = param.startsWith('a') ? 2 : param === 'phi' ? 2 : 1;
                    valueDisplay.textContent = value.toFixed(decimals);
                    parameters[param] = value;
                }
            });
        }

        function generateSurface() {
            const equationInput = document.getElementById('equation');
            const equationText = equationInput.value.trim();
            const statusDiv = document.getElementById('equation-status');

            if (!equationText) {
                statusDiv.innerHTML = '<div class="alert alert-danger">Please enter an equation</div>';
                return;
            }

            try {
                const testExpr = math.parse(equationText);
                const compiled = testExpr.compile();

                const testScope = { x: 1, y: 1, ...parameters };
                compiled.evaluate(testScope);

                statusDiv.innerHTML = '<div class="alert alert-success">✓ Valid equation</div>';
                currentEquation = equationText;

                setTimeout(() => createSurface(compiled), 50);
            } catch (error) {
                statusDiv.innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
            }
        }

        function createSurface(compiledEquation) {
            const resolution = parseInt(document.getElementById('resolution').value);
            const range = parseInt(document.getElementById('range').value);
            const thickness = parseFloat(document.getElementById('thickness').value);
            const zScale = parseFloat(document.getElementById('zScale').value);
            const opacity = parseFloat(document.getElementById('opacity').value);

            if (surface) scene.remove(surface);
            if (wireframe) scene.remove(wireframe);

            const geometry = createSolidGeometry(resolution, range, thickness, zScale, compiledEquation);

            const material = new THREE.MeshPhongMaterial({
                color: 0xed8008,
                transparent: true,
                opacity: opacity,
                side: THREE.DoubleSide,
                shininess: 100
            });

            surface = new THREE.Mesh(geometry, material);
            surface.receiveShadow = true;
            surface.castShadow = true;
            scene.add(surface);

            const wireframeMaterial = new THREE.MeshBasicMaterial({
                color: 0x2a2a2a,
                wireframe: true,
                transparent: true,
                opacity: 0.3
            });

            wireframe = new THREE.Mesh(geometry.clone(), wireframeMaterial);
            wireframe.visible = showWireframe;
            scene.add(wireframe);
        }

        function createSolidGeometry(resolution, range, thickness, zScale, compiledEquation) {
            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            const indices = [];

            function calculateZ(x, y) {
                try {
                    const result = compiledEquation.evaluate({ x, y, ...parameters });
                    return (typeof result === 'number' && isFinite(result)) ? result * zScale : 0;
                } catch (error) {
                    return 0;
                }
            }

            const step = (range * 2) / resolution;
            const gridVertices = [];

            for (let i = 0; i <= resolution; i++) {
                gridVertices[i] = [];
                for (let j = 0; j <= resolution; j++) {
                    const x = -range + i * step;
                    const y = -range + j * step;
                    const z = calculateZ(x, y);
                    gridVertices[i][j] = { x, y, z };
                }
            }

            for (let i = 0; i <= resolution; i++) {
                for (let j = 0; j <= resolution; j++) {
                    const v = gridVertices[i][j];
                    vertices.push(v.x, v.y, v.z);
                }
            }

            for (let i = 0; i <= resolution; i++) {
                for (let j = 0; j <= resolution; j++) {
                    const v = gridVertices[i][j];
                    vertices.push(v.x, v.y, v.z - thickness);
                }
            }

            const pointsPerRow = resolution + 1;
            const totalTopPoints = pointsPerRow * pointsPerRow;

            for (let i = 0; i < resolution; i++) {
                for (let j = 0; j < resolution; j++) {
                    const a = i * pointsPerRow + j;
                    const b = i * pointsPerRow + (j + 1);
                    const c = (i + 1) * pointsPerRow + (j + 1);
                    const d = (i + 1) * pointsPerRow + j;
                    indices.push(a, b, c, a, c, d);
                }
            }

            for (let i = 0; i < resolution; i++) {
                for (let j = 0; j < resolution; j++) {
                    const a = totalTopPoints + i * pointsPerRow + j;
                    const b = totalTopPoints + i * pointsPerRow + (j + 1);
                    const c = totalTopPoints + (i + 1) * pointsPerRow + (j + 1);
                    const d = totalTopPoints + (i + 1) * pointsPerRow + j;
                    indices.push(a, c, b, a, d, c);
                }
            }

            geometry.setIndex(indices);
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.computeVertexNormals();

            return geometry;
        }

        function loadExample(equation) {
            document.getElementById('equation').value = equation;
            generateSurface();
        }

        function resetView() {
            controls.rotationX = 0.3;
            controls.rotationY = 0.5;
            camera.position.set(8, 8, 8);
            updateCameraPosition();
        }

        function toggleWireframe() {
            showWireframe = !showWireframe;
            if (wireframe) wireframe.visible = showWireframe;
        }

        function onMouseDown(event) {
            controls.isMouseDown = true;
            controls.mouseX = event.clientX;
            controls.mouseY = event.clientY;
        }

        function onMouseMove(event) {
            if (!controls.isMouseDown) return;
            const deltaX = event.clientX - controls.mouseX;
            const deltaY = event.clientY - controls.mouseY;
            controls.rotationY += deltaX * 0.01;
            controls.rotationX += deltaY * 0.01;
            controls.rotationX = Math.max(-Math.PI/2, Math.min(Math.PI/2, controls.rotationX));
            updateCameraPosition();
            controls.mouseX = event.clientX;
            controls.mouseY = event.clientY;
        }

        function onMouseUp() {
            controls.isMouseDown = false;
        }

        function onWheel(event) {
            const distance = camera.position.length();
            const newDistance = distance + event.deltaY * 0.01;
            if (newDistance > 2 && newDistance < 50) {
                camera.position.multiplyScalar(newDistance / distance);
            }
        }

        function updateCameraPosition() {
            const distance = camera.position.length();
            camera.position.x = distance * Math.cos(controls.rotationX) * Math.cos(controls.rotationY);
            camera.position.y = distance * Math.sin(controls.rotationX);
            camera.position.z = distance * Math.cos(controls.rotationX) * Math.sin(controls.rotationY);
            camera.lookAt(0, 0, 0);
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!controls.isMouseDown) {
                controls.rotationY += 0.005;
                updateCameraPosition();
            }
            renderer.render(scene, camera);
        }

        function exportSTL() {
            if (!surface) {
                alert('Generate a surface first');
                return;
            }
            const geometry = surface.geometry;
            const vertices = geometry.attributes.position.array;
            const indices = geometry.index.array;
            let stlString = `solid equation\n`;
            for (let i = 0; i < indices.length; i += 3) {
                const a = indices[i] * 3;
                const b = indices[i + 1] * 3;
                const c = indices[i + 2] * 3;
                const v1 = new THREE.Vector3(vertices[a], vertices[a + 1], vertices[a + 2]);
                const v2 = new THREE.Vector3(vertices[b], vertices[b + 1], vertices[b + 2]);
                const v3 = new THREE.Vector3(vertices[c], vertices[c + 1], vertices[c + 2]);
                const cb = new THREE.Vector3();
                const ab = new THREE.Vector3();
                cb.subVectors(v3, v2);
                ab.subVectors(v1, v2);
                cb.cross(ab).normalize();
                stlString += `  facet normal ${cb.x.toFixed(6)} ${cb.y.toFixed(6)} ${cb.z.toFixed(6)}\n`;
                stlString += '    outer loop\n';
                stlString += `      vertex ${v1.x.toFixed(6)} ${v1.y.toFixed(6)} ${v1.z.toFixed(6)}\n`;
                stlString += `      vertex ${v2.x.toFixed(6)} ${v2.y.toFixed(6)} ${v2.z.toFixed(6)}\n`;
                stlString += `      vertex ${v3.x.toFixed(6)} ${v3.y.toFixed(6)} ${v3.z.toFixed(6)}\n`;
                stlString += '    endloop\n  endfacet\n';
            }
            stlString += 'endsolid equation';
            const blob = new Blob([stlString], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'equation_3d.stl';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Accordion toggle
        function toggleAccordion(id) {
            const content = document.getElementById(id + '-accordion');
            const header = content.previousElementSibling;
            content.classList.toggle('active');
            header.classList.toggle('active');
        }

        // Mobile controls toggle
        function toggleMobileControls() {
            document.getElementById('controls-sidebar').classList.toggle('active');
        }

        // Help modal
        function openHelp() {
            document.getElementById('helpModal').classList.add('show');
        }

        function closeHelp() {
            document.getElementById('helpModal').classList.remove('show');
        }

        // Initialize
        init();
    </script>
</body>
</html>
